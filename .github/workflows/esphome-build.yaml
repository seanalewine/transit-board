name: ESPHome Build

on:
  push:
    branches: [main]
    paths:
      - 'esphome-controller/**'
      - '.github/workflows/esphome-build.yaml'

jobs:
  lint:
    name: Lint ESPHome configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5.0.0
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Validate ESPHome configurations
        run: |
          for config in esphome-controller/boards/*.yaml; do
            esphome config "$config" || exit 1
          done

  build:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [transit-board-a, transit-board-b]
    name: Build ${{ matrix.board }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate versions match
        id: version
        run: |
          VERSION_A=$(grep "project_version:" esphome-controller/boards/transit-board-a.yaml | sed 's/.*: *"\(.*\)"/\1/')
          VERSION_B=$(grep "project_version:" esphome-controller/boards/transit-board-b.yaml | sed 's/.*: *"\(.*\)"/\1/')
          
          if [ "$VERSION_A" != "$VERSION_B" ]; then
            echo "ERROR: Version mismatch between boards: transit-board-a=$VERSION_A, transit-board-b=$VERSION_B"
            exit 1
          fi
          
          echo "version=$VERSION_A" >> $GITHUB_OUTPUT

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('esphome-controller/**/*.yaml', '.github/workflows/esphome-build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Cache ESPHome
        uses: actions/cache@v4
        with:
          path: .esphome
          key: ${{ runner.os }}-esphome-${{ hashFiles('esphome-controller/**/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-esphome-

      - name: Build ESPHome firmware
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome-controller/boards/${{ matrix.board }}.yaml
          version: latest
          complete-manifest: true

      - name: Rename output folder
        run: |
          mv ${{ matrix.board }}-esp32c6 ${{ matrix.board }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}
          path: ${{ matrix.board }}
          retention-days: 7

  release:
    needs: [lint, build]
    runs-on: ubuntu-latest
    name: Create Release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get version from board config
        id: version
        run: |
          VERSION=$(grep "project_version:" esphome-controller/boards/transit-board-a.yaml | sed 's/.*: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest release tag
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // empty')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check version changed
        id: check
        run: |
          if [ "${{ steps.latest.outputs.tag }}" == "v${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
          echo "Version check: latest=${{ steps.latest.outputs.tag }}, current=v${{ steps.version.outputs.version }}, skip=${{ steps.check.outputs.skip }}"

      - name: Download transit-board-a artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v8
        with:
          name: transit-board-a
          path: transit-board-a

      - name: Download transit-board-b artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/download-artifact@v8
        with:
          name: transit-board-b
          path: transit-board-b

      - name: Rename manifest files
        if: steps.check.outputs.skip == 'false'
        run: |
          mv transit-board-a/manifest.json transit-board-a/transit-board-a-manifest.json
          mv transit-board-b/manifest.json transit-board-b/transit-board-b-manifest.json

      - name: Create Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            Firmware release v${{ steps.version.outputs.version }}
            
            ## Files
            - `transit-board-a.ota.bin` - OTA update for Transit Board A
            - `transit-board-a.factory.bin` - Factory flash for Transit Board A
            - `transit-board-b.ota.bin` - OTA update for Transit Board B
            - `transit-board-b.factory.bin` - Factory flash for Transit Board B
            - `*-manifest.json` files - Update manifests for each device
          files: |
            transit-board-a/*.bin
            transit-board-a/transit-board-a-manifest.json
            transit-board-b/*.bin
            transit-board-b/transit-board-b-manifest.json
          draft: false
          prerelease: false

      - name: Skip Release
        if: steps.check.outputs.skip == 'true'
        run: echo "Version v${{ steps.version.outputs.version }} already released, skipping release creation"