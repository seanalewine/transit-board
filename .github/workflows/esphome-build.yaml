name: ESPHome Build

on:
  push:
    branches: [main]
    paths:
      - 'esphome-controller/**'
      - '.github/workflows/esphome-build.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [transit-board-0001, transit-board-0002]
    name: Build ${{ matrix.board }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract board_id
        id: board_id
        run: |
          BOARD_ID=$(echo "${{ matrix.board }}" | sed 's/transit-board-//')
          echo "board_id=$BOARD_ID" >> $GITHUB_OUTPUT

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('esphome-controller/**/*.yaml', '.github/workflows/esphome-build.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Create mock secrets for CI
        run: |
          cat > esphome-controller/boards/secrets.yaml << 'EOF'
          wifi_ssid: "CI_BUILD"
          wifi_password: "ci_build_password"
          transition_length: 0.25s
          EOF

      - name: Prepare station map
        run: |
          cp esphome-controller/boards/station_map.${{ steps.board_id.outputs.board_id }}.h \
             esphome-controller/boards/station_map.h

      - name: Build ESPHome firmware
        uses: esphome/build-action@v7
        with:
          yaml-file: esphome-controller/boards/${{ matrix.board }}.yaml
          version: latest
          complete-manifest: true

      - name: Rename output folder
        run: |
          mv ${{ matrix.board }}-esp32c6 ${{ matrix.board }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.board }}
          path: ${{ matrix.board }}
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Create Release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download transit-board-0001 artifact
        uses: actions/download-artifact@v4
        with:
          name: transit-board-0001
          path: transit-board-0001

      - name: Download transit-board-0002 artifact
        uses: actions/download-artifact@v4
        with:
          name: transit-board-0002
          path: transit-board-0002

      - name: Rename manifest files
        run: |
          mv transit-board-0001/manifest.json transit-board-0001/transit-board-0001-manifest.json
          mv transit-board-0002/manifest.json transit-board-0002/transit-board-0002-manifest.json

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: firmware-${{ steps.sha.outputs.short }}
          name: Firmware Build ${{ steps.sha.outputs.short }}
          body: |
            Automated firmware build from commit ${{ steps.sha.outputs.short }}
            
            ## Files
            - `transit-board-0001.ota.bin` - OTA update for Transit Board 0001
            - `transit-board-0001.factory.bin` - Factory flash for Transit Board 0001
            - `transit-board-0002.ota.bin` - OTA update for Transit Board 0002
            - `transit-board-0002.factory.bin` - Factory flash for Transit Board 0002
            - `*-manifest.json` files - Update manifests for each device
          files: |
            transit-board-0001/*.bin
            transit-board-0001/transit-board-0001-manifest.json
            transit-board-0002/*.bin
            transit-board-0002/transit-board-0002-manifest.json
          draft: false
          prerelease: false
