# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: CTA Live Train Tracker Server
description: Tool for retrieving live train location data over CTA API and outputing an array of stations with trains due.
url: "https://github.com/seanalewine/cta-location-tracker/tree/main/tracker"
version: "0.1.1"
slug: tracker
init: false
ingress: true
map:
  - share:rw
  - media:rw
  - share:rw
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
   trainsPerLine: Not Working. Output up to 10 different train runs on each line
   document_root: /share/htdocs
   default_conf: default
   default_ssl_conf: default
   website_name: null
   ssl: false
   certfile: fullchain.pem
   keyfile: privkey.pem
   init_commands: []
schema:
   trainsPerLine: str  
   beer: bool
   document_root: str
   default_conf: str
   default_ssl_conf: str
   website_name: str
   username: str?
   password: password?
   ssl: bool
   certfile: str
   keyfile: str
   init_commands:
    - str?
schema:
  message: "str?"
ports:
   80/tcp: 80
   443/tcp: 8324
ports_description:
   80/tcp: Web interface http
   443/tcp: SSL Web interface
