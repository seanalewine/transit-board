esphome:
  name: esp-train-tracker
  friendly_name: L Train Tracker
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --- Start of Generated Partitions (0 to 255) ---
light:
  - platform: partition
    name: "0"
    segments:
      - id: stop_indicators
        from: 0
        to: 0
    default_transition_length: !secret transition_length

