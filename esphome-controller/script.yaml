esphome:
  name: esp-train-tracker
  friendly_name: L Train Tracker
  min_version: 2025.9.0
  name_add_mac_suffix: false

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

# Enable logging
logger:

number:
  - platform: template
    name: "Global Brightness"
    min_value: 0
    max_value: 100
    step: 1
    mode: slider
    optimistic: true
    initial_value: 100
    id: global_brightness

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

#Start of Separation of Individual LEDs on the strip.
light:
  - platform: partition
    name: "2"
    segments:
      - id: stop_indicators
        from: 2
        to: 2
    default_transition_length: !secret transition_length

